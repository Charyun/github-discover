# Gitee Go pipeline — push to main triggers EdgeOne Pages deploy
# Docs: https://gitee.com/help/articles/4306

name: Deploy to EdgeOne Pages

trigger:
  branch:
    - main
  # tag 触发条件按需开启
  # tag:
  #   - v*

steps:
  - name: Checkout
    image: alpine/git
    commands:
      - git clone --depth 1 https://gitee.com/$GITEE_REPO_URL . || true
      - git checkout $GITEE_REF_NAME

  - name: Setup Node & Build
    image: node:22
    commands:
      - node -v
      - npm -v
      - npm install --legacy-peer-deps
      - npm run build
    cache:
      - node_modules/

  - name: Deploy to EdgeOne
    image: node:22
    depends_on:
      - Setup Node & Build
    commands:
      - npx edgeone deploy
    environment:
      EDGEONE_API_TOKEN:
        from_secret: EDGEONE_API_TOKEN
      EDGEONE_PROJECT_NAME: openhub